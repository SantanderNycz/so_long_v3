<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>So Long – Web Edition</title>
  <link rel="icon" type="image/png" href="./assets/player.png" />
  <script type="module" crossorigin src="./assets/index-DQ-hCZB1.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-2UvYJSX8.css">
</head>
<body>
  <h1>🗝 So Long</h1>

  <p id="loading">A carregar assets…</p>

  <div id="ui">

    <!-- Controls row -->
    <div class="controls">
      <label for="map-select" style="font-size:0.85rem;color:var(--muted)">Mapa:</label>
      <select id="map-select">
        <option value="map_42">map_42 (original)</option>
        <option value="map_2">map_2</option>
        <option value="map_3">map_3</option>
        <option value="small">small</option>
      </select>
      <button id="restart">↺ Reiniciar</button>
      <span id="map-error"></span>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="game"></canvas>
    </div>

    <!-- D-pad -->
    <div id="dpad">
      <button id="btn-up">▲</button>
      <button id="btn-left">◀</button>
      <button id="btn-right">▶</button>
      <button id="btn-down">▼</button>
    </div>

    <p class="hints">
      Mover: <kbd>W A S D</kbd> ou <kbd>↑ ↓ ← →</kbd> &nbsp;·&nbsp;
      Reiniciar: <kbd>Enter</kbd>
    </p>

    <!-- Custom map loader -->
    <div id="custom-section">
      <details>
        <summary>📂 Carregar mapa personalizado (.ber)</summary>
        <div class="custom-inner">
          <textarea id="custom-map" placeholder="Cole aqui o conteúdo de um ficheiro .ber&#10;Exemplo:&#10;11111&#10;1P0E1&#10;10C01&#10;11111"></textarea>
          <button id="load-custom">Carregar</button>
        </div>
      </details>
    </div>

  </div>

</body>
</html>
