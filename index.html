<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>So Long – Web Edition</title>
  <link rel="icon" type="image/png" href="/assets/player.png" />
</head>

<body>
  <h1>🗝 So Long</h1>

  <p id="loading">A carregar assets…</p>

  <div id="ui">

    <!-- Level banner -->
    <div id="level-banner">
      <span class="lv-name">Nível 1</span>
      <span class="lv-sub">Aprende a mover-te</span>
    </div>

    <!-- Restart -->
    <div class="controls">
      <button id="restart">↺ Reiniciar nível</button>
      <span class="hints">
        Mover: <kbd>W A S D</kbd> / <kbd>↑ ↓ ← →</kbd> &nbsp;·&nbsp;
        Avançar / Reiniciar: <kbd>Enter</kbd>
      </span>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="game"></canvas>
    </div>

    <!-- D-pad -->
    <div id="dpad">
      <button id="btn-up">▲</button>
      <button id="btn-left">◀</button>
      <button id="btn-right">▶</button>
      <button id="btn-down">▼</button>
    </div>

  </div>

  <!-- End screen overlay -->
  <div id="end-overlay">
    <div class="end-card">
      <div class="end-trophy">🏆</div>
      <h2>Parabéns!</h2>
      <p>Completaste todos os 10 níveis.</p>
      <button id="end-restart">Jogar de novo</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
